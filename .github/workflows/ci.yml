# CI Pipeline - runs on PRs and pushes to main
# Tests, linting, and type checking to ensure code quality

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e ".[dev]"
      
      - name: Lint with Ruff
        run: |
          ruff check src/
          ruff format --check src/
      
      - name: Type check with MyPy
        run: |
          mypy src/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
        env:
          # Mock mode for tests - no external services needed
          SNOWFLAKE_MOCK_MODE: "true"
          R2_MOCK_MODE: "true"
          VIDEO_PROCESSOR_MOCK_MODE: "true"
          API_KEYS: "test-key"
          ANTHROPIC_API_KEY: "test-key"

